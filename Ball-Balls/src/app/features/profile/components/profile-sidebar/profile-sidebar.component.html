<nav
    class="flex flex-col gap-2 sticky top-24 bg-[var(--bg-card)] p-4 rounded-3xl shadow-md border border-[var(--border-color)]">
    <button (click)="onTabChange('public')"
        class="flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all duration-200 font-medium w-full text-left outline-none focus:ring-2 focus:ring-[var(--accent-primary)]/50"
        [ngClass]="activeTab() === 'public' ? 'bg-[var(--accent-primary)] text-white shadow-md' : 'text-[var(--text-secondary)] hover:bg-[var(--bg-tertiary)] hover:text-[var(--text-primary)]'">
        <i class="pi pi-user text-xl"
            [ngClass]="activeTab() === 'public' ? 'text-white' : 'text-[var(--accent-secondary)]'"></i>
        Información Pública
    </button>

    @if (isCurrentUser()) {
    <button (click)="onTabChange('settings')"
        class="flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all duration-200 font-medium w-full text-left outline-none focus:ring-2 focus:ring-[var(--accent-primary)]/50"
        [ngClass]="activeTab() === 'settings' ? 'bg-[var(--accent-primary)] text-white shadow-md' : 'text-[var(--text-secondary)] hover:bg-[var(--bg-tertiary)] hover:text-[var(--text-primary)]'">
        <i class="pi pi-cog text-xl"
            [ngClass]="activeTab() === 'settings' ? 'text-white' : 'text-[var(--text-muted)]'"></i>
        Ajustes
    </button>
    }
</nav>
