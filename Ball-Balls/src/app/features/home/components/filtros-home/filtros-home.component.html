<div [formGroup]="searchForm" class="
  bg-card
  rounded-full
  shadow-xl hover:shadow-2xl
  border border-border-color
  p-2 pl-6
  flex items-center
  w-full max-w-3xl
  mb-16
  transform transition-all hover:-translate-y-1
  animate-in fade-in zoom-in duration-700 delay-200
">
    <!-- Date -->
    <div
        class="flex-1 hidden md:flex flex-col items-start px-4 border-r border-border-color cursor-pointer hover:bg-tertiary rounded-lg transition-colors p-2">
        <label for="fecha" class="text-xs font-bold text-primary uppercase tracking-wide mb-1">Fecha</label>
        <p-calendar inputId="fecha" formControlName="fecha" placeholder="Selecciona fecha" [showIcon]="false"
            dateFormat="dd/mm/yy" styleClass="w-full"
            inputStyleClass="w-full border-none bg-transparent p-0 text-secondary text-sm font-normal focus:ring-0 placeholder:text-muted cursor-pointer"
            appendTo="body">
        </p-calendar>
    </div>

    <!-- Sport -->
    <div
        class="flex-1 flex flex-col items-start px-4 md:border-r border-border-color cursor-pointer hover:bg-tertiary rounded-lg transition-colors p-2">
        <label for="deporte" class="text-xs font-bold text-primary uppercase tracking-wide mb-1">Deporte</label>
        <p-dropdown inputId="deporte" [options]="(deportes$ | async) || []" formControlName="deporte"
            optionLabel="nombre" placeholder="Selecciona deporte"
            styleClass="w-full border-none bg-transparent shadow-none p-0"
            panelStyleClass="bg-card border border-border-color shadow-lg rounded-xl" appendTo="body">

            <ng-template pTemplate="selectedItem" let-selectedOption>
                <div class="flex items-center gap-2" *ngIf="selectedOption">
                    <span class="text-secondary text-sm font-normal">{{ selectedOption.nombre }}</span>
                </div>
                <div *ngIf="!selectedOption" class="text-muted text-sm">Selecciona deporte</div>
            </ng-template>

            <ng-template pTemplate="item" let-deporte>
                <div class="flex items-center gap-2 py-1">
                    <span class="text-primary text-sm">{{ deporte.nombre }}</span>
                </div>
            </ng-template>
        </p-dropdown>
    </div>

    <!-- Search Button -->
    <button (click)="onSearch()" aria-label="Buscar pistas"
        class="bg-accent-primary hover:bg-red-600 text-white rounded-full p-4 shadow-lg transition-all transform active:scale-95 flex items-center justify-center aspect-square ml-auto">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
        </svg>
    </button>
</div>
